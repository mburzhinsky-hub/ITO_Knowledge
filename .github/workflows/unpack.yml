name: Unpack knowledge base

on:
  push:
    paths:
      - '.github/workflows/unpack.yml'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and extract project
        shell: bash
        run: |
          cat _bootstrap/archive.part*.b64 | base64 --decode > /tmp/ito-knowledge.zip
          unzip -o /tmp/ito-knowledge.zip -d .
          rm -rf _bootstrap

      - name: Commit extracted project
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Publish ITO knowledge base assets"
            git push
          fi
